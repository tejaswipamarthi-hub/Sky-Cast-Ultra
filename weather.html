<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast Ultra - Pro Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background: #121212; color: white; min-height: 100vh;
            transition: background 1.2s ease; background-size: cover;
            background-position: center; background-attachment: fixed; overflow-x: hidden;
        }

        /* Weather Themes & Animations */
        body.sunny { background-image: url('https://images.unsplash.com/photo-1502082553048-f009c37129b9'); }
        body.rainy { background-image: url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21'); }
        body.snowy { background-image: url('https://images.unsplash.com/photo-1483664852095-d6cc6870702d'); }
        body.cloudy { background-image: url('https://images.unsplash.com/photo-1499346030926-9a72daac6c63'); }
        body.thunder { background-image: url('https://images.unsplash.com/photo-1500674425229-f692875b0ab7'); }

        .weather-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0; transition: 1s; }
        .rain-anim { background: linear-gradient(transparent, rgba(255,255,255,0.2)); background-size: 2px 50px; animation: rain 0.6s linear infinite; }
        .snow-anim { background-image: radial-gradient(white 2px, transparent 2px); background-size: 40px 40px; animation: snow 10s linear infinite; }
        .sun-glow { background: radial-gradient(circle at 85% 15%, rgba(255,223,0,0.3) 0%, transparent 60%); animation: pulse 4s infinite alternate; }
        
        @keyframes rain { 0% { background-position: 0 0; } 100% { background-position: 0 50px; } }
        @keyframes snow { 0% { background-position: 0 0; } 100% { background-position: 50px 800px; } }
        @keyframes pulse { from { opacity: 0.2; } to { opacity: 0.6; } }

        header { padding: 40px; text-align: center; background: rgba(0,0,0,0.7); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        input { padding: 12px 25px; border-radius: 30px; border: none; width: 250px; outline: none; font-size: 1rem; }
        
        button { padding: 12px 20px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.3s; }
        .btn-main { background: #ffd369; color: #000; }
        .btn-voice { background: #ffffff; color: #333; }
        .btn-stop { background: #ff4d4d; color: #fff; }
        .btn-fav { background: #ff8c00; color: #fff; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        
        #favoritesList { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .fav-btn { background: rgba(255,255,255,0.15); padding: 8px 18px; border-radius: 20px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); color: white; }

        #suggestionCard {
            background: rgba(255, 211, 105, 0.15); border: 2px solid #ffd369;
            padding: 20px; border-radius: 20px; margin-bottom: 30px;
            text-align: center; display: none; backdrop-filter: blur(10px);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; transition: 0.3s; }
        .card:hover { background: rgba(255,255,255,0.15); }
        .icon-large { width: 95px; filter: drop-shadow(0 0 10px white); }

        .forecast-grid { display: flex; overflow-x: auto; gap: 15px; padding: 15px 0; }
        .f-card { min-width: 130px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }

        #map { height: 400px; width: 100%; border-radius: 25px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body id="main">

    <div id="rainLayer" class="weather-layer rain-anim"></div>
    <div id="snowLayer" class="weather-layer snow-anim"></div>
    <div id="sunLayer" class="weather-layer sun-glow"></div>

    <header>
        <h1>🌏 SkyCast Ultra</h1>
        <div style="margin-top: 20px;">
            <input id="cityInput" placeholder="Enter city name...">
            <button class="btn-main" onclick="getWeather()">Search</button>
            <button class="btn-fav" onclick="saveFavorite()">⭐ Save</button>
            <button class="btn-voice" onclick="voiceSearch()">🎤 Voice</button>
            <button class="btn-stop" onclick="stopVoice()">⏹ Stop Voice</button>
            <button class="btn-main" onclick="toggleUnit()">°C/°F</button>
        </div>
        <div id="favoritesList" style="margin-top: 15px;"></div>
    </header>

    <div class="container">
        <div id="suggestionCard">
            <h3 style="color: #ffd369;">💡 Smart Suggestion</h3>
            <p id="suggestionText" style="font-size: 1.2rem; margin-top: 10px;"></p>
        </div>

        <h2 id="cityName" style="text-align: center; font-size: 2.5rem; margin-bottom: 30px;">Find Your Weather</h2>
        
        <div class="grid">
            <div class="card"><h3>Condition</h3><img id="icon" class="icon-large" style="display:none;"><p id="cond">--</p></div>
            <div class="card"><h3>Temp</h3><p id="temp" style="font-size: 2.2rem;">--</p></div>
            <div class="card"><h3>Humidity</h3><p id="hum">--</p></div>
            <div class="card"><h3>Wind</h3><p id="wind">--</p></div>
            <div class="card" style="background: rgba(255,223,0,0.1);"><h3>🌅 Sunrise</h3><p id="rise">--</p></div>
            <div class="card" style="background: rgba(255,140,0,0.1);"><h3>🌇 Sunset</h3><p id="set">--</p></div>
        </div>

        <h3 style="margin-bottom: 10px;">📅 5-Day Outlook</h3>
        <div id="forecast" class="forecast-grid"></div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
    <script>
        const apiKey = "d875f6fe6639861b8f19cdb531f88727";
        let isMetric = true;
        let favorites = JSON.parse(localStorage.getItem('favCities')) || [];
        let map = L.map('map').setView([20, 78], 4);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        window.onload = renderFavorites;

        function speak(text) {
            window.speechSynthesis.cancel(); // Clear previous speech
            const utterance = new SpeechSynthesisUtterance(text);
            window.speechSynthesis.speak(utterance);
        }

        function stopVoice() {
            window.speechSynthesis.cancel(); // Immediate silence
        }

        async function getWeather(cityQuery) {
            const city = cityQuery || document.getElementById("cityInput").value.trim();
            if(!city) return;
            const unit = isMetric ? "metric" : "imperial";
            
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=${unit}`);
                const data = await res.json();
                if(data.cod !== 200) return alert("City not found");
                
                updateUI(data);
                updateForecast(city, unit);
                const msg = getSuggestions(data);
                applyTheme(data.weather[0].id);
                map.setView([data.coord.lat, data.coord.lon], 11);

                // Voice Report
                speak(`Weather in ${data.name} is ${data.weather[0].description}. Temperature is ${Math.round(data.main.temp)} degrees. ${msg}`);

            } catch(e) { console.error(e); }
        }

        function updateUI(data) {
            const uTag = isMetric ? "°C" : "°F";
            document.getElementById("cityName").innerText = `${data.name}, ${data.sys.country}`;
            document.getElementById("temp").innerText = `${Math.round(data.main.temp)}${uTag}`;
            document.getElementById("hum").innerText = `${data.main.humidity}%`;
            document.getElementById("wind").innerText = `${data.wind.speed} ${isMetric ? 'm/s':'mph'}`;
            document.getElementById("cond").innerText = data.weather[0].description;
            
            const icon = document.getElementById("icon");
            icon.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
            icon.style.display = "inline-block";

            const format = (t) => new Date(t * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            document.getElementById("rise").innerText = format(data.sys.sunrise);
            document.getElementById("set").innerText = format(data.sys.sunset);
        }

        async function updateForecast(city, unit) {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${apiKey}&units=${unit}`);
            const data = await res.json();
            const container = document.getElementById("forecast");
            container.innerHTML = "";
            for(let i = 0; i < data.list.length; i += 8) {
                const day = data.list[i];
                container.innerHTML += `<div class="f-card"><p style="font-weight:bold">${new Date(day.dt_txt).toLocaleDateString([], {weekday:'short'})}</p><img src="https://openweathermap.org/img/wn/${day.weather[0].icon}.png"><p>${Math.round(day.main.temp)}°</p></div>`;
            }
        }

        function getSuggestions(data) {
            const temp = data.main.temp;
            const id = data.weather[0].id;
            let msg = "";
            if (id >= 200 && id < 600) msg = "Rainy day! Bring an umbrella.";
            else if (id >= 600 && id < 700) msg = "Snowy weather! Wear heavy layers.";
            else if (temp > 30) msg = "Very hot! Stay hydrated.";
            else if (temp > 20) msg = "Perfect day for a walk!";
            else msg = "It's cold, wear a jacket.";

            document.getElementById("suggestionText").innerText = msg;
            document.getElementById("suggestionCard").style.display = "block";
            return msg;
        }

        function saveFavorite() {
            const city = document.getElementById("cityInput").value.trim();
            if(city && !favorites.includes(city)) {
                favorites.push(city);
                localStorage.setItem('favCities', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        function renderFavorites() {
            const list = document.getElementById("favoritesList");
            list.innerHTML = favorites.map(c => `<button class="fav-btn" onclick="getWeather('${c}')">${c}</button>`).join('');
        }

        function applyTheme(id) {
            const body = document.getElementById("main");
            const layers = [document.getElementById("rainLayer"), document.getElementById("snowLayer"), document.getElementById("sunLayer")];
            body.className = "";
            layers.forEach(l => l.style.opacity = "0");

            if(id >= 200 && id < 600) { body.classList.add("rainy"); layers[0].style.opacity = "1"; }
            else if(id >= 600 && id < 700) { body.classList.add("snowy"); layers[1].style.opacity = "1"; }
            else if(id === 800) { body.classList.add("sunny"); layers[2].style.opacity = "1"; }
            else { body.classList.add("cloudy"); }
        }

        function voiceSearch() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!SpeechRecognition) return;
            const rec = new SpeechRecognition();
            rec.onstart = () => { document.getElementById("cityInput").placeholder = "Listening..."; };
            rec.onresult = (e) => { 
                const transcript = e.results[0][0].transcript;
                document.getElementById("cityInput").value = transcript; 
                getWeather(); 
            };
            rec.start();
        }

        function toggleUnit() { isMetric = !isMetric; if(document.getElementById("cityInput").value) getWeather(); }
    </script>
</body>
</html>
